
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Design Preview</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px;
      box-sizing: border-box;
      overflow: auto;
      font-family: Arial, sans-serif;
    }

    .canvas {
      width: 1080px;
      height: 1080px;
      background: #0b163d;
      color: #f8fafc;
      padding: 40px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      text-align: left;
      overflow: hidden;
    }

    .content-stack {
      padding-top: 150px;
      margin-bottom: 72px;
    }

    .headline {
      font-size: 52px;
      color: #f8fafc;
      max-width: 780px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }

    .stat-headline {
      font-size: 72px;
      line-height: 0.98;
      max-width: 780px;
    }

    .body {
      font-size: 24px;
      color: #f8fafc;
      max-width: 720px;
      line-height: 1.3;
      font-weight: 400;
      opacity: 0.92;
      margin-bottom: 0;
    }

    .cta {
      font-size: 18px;
      color: #38bdf8;
      max-width: 720px;
      line-height: 1.15;
      font-weight: 800;
      opacity: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: auto;
      margin-bottom: 72px;
    }
  </style>
</head>
<body>
  <div class="canvas">
    
    <div class="content-stack">
      <div class="headline">AI adoption has a trust problem</div>
      <div class="body">Most organisations do not lack tools. They lack process control, trust, and usable governance.</div>
    </div>
    <div class="cta">Start at the process layer</div>
  
  </div>
</body>
</html>
